<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Petition Detail</title>
</head>
<body>
    <h1 th:text="${petition.title}"></h1>

    <p>
        <strong>Created by:</strong>
        <span th:text="${petition.creatorName}"></span>
    </p>

    <p th:text="${petition.description}"></p>

    <h2>Signatures</h2>
    <ul>
        <li th:if="${#lists.isEmpty(petition.signatures)}">No signatures yet.</li>
        <li th:each="sig : ${petition.signatures}">
            <span th:text="${sig.name}"></span> -
            <span th:text="${sig.email}"></span>
        </li>
    </ul>

    <h2>Sign this Petition</h2>
    <form th:action="@{/petitions/{id}/sign(id=${petition.id})}" th:object="${signature}" method="post">
        <label>Name:</label><br>
        <input type="text" th:field="*{name}" required><br><br>

        <label>Email:</label><br>
        <input type="email" th:field="*{email}" required><br><br>

        <button type="submit">Sign Petition</button>
    </form>

    <p><a href="/petitions">Back to All Petitions</a></p>
</body>
</html>
